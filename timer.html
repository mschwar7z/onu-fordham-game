<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONU Fordham Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="timer.js"></script>
</head>
<body>
    <!-- Timer Page -->
    <div class="background-container">
        <img src="static/images/backgrounds/background.png" alt="Background" class="background-image">
   
        <div class="container">
            <!-- Logo Section -->
            <div class="logo-container">
                <img src="static/images/backgrounds/logo.png" alt="Logo" class="logo-image">
            </div>

            <!-- Timer Section -->
            <div class="timer-container">
                <div class="timer-header">
                    <h1 class="timer-title">SET TIME</h1>
                    <p class="timer-subtitle desktop-hint">USE ARROW KEYS OR SCROLL</p>
                    <p class="timer-subtitle mobile-hint">SWIPE UP/DOWN TO ADJUST</p>
                </div>
                
                <!-- Time Picker -->
                <div class="time-picker" id="timePicker">
                    <div class="digit-column" data-digit="0" data-max="5">
                        <div class="digit-arrow up" onclick="adjustDigit(0, 1)">▲</div>
                        <div class="digit-scroll-container">
                            <div class="digit-value">0</div>
                        </div>
                        <div class="digit-arrow down" onclick="adjustDigit(0, -1)">▼</div>
                    </div>
                    <div class="digit-column" data-digit="1" data-max="9">
                        <div class="digit-arrow up" onclick="adjustDigit(1, 1)">▲</div>
                        <div class="digit-scroll-container">
                            <div class="digit-value">5</div>
                        </div>
                        <div class="digit-arrow down" onclick="adjustDigit(1, -1)">▼</div>
                    </div>
                    <div class="digit-separator">:</div>
                    <div class="digit-column" data-digit="2" data-max="5">
                        <div class="digit-arrow up" onclick="adjustDigit(2, 1)">▲</div>
                        <div class="digit-scroll-container">
                            <div class="digit-value">0</div>
                        </div>
                        <div class="digit-arrow down" onclick="adjustDigit(2, -1)">▼</div>
                    </div>
                    <div class="digit-column" data-digit="3" data-max="9">
                        <div class="digit-arrow up" onclick="adjustDigit(3, 1)">▲</div>
                        <div class="digit-scroll-container">
                            <div class="digit-value">0</div>
                        </div>
                        <div class="digit-arrow down" onclick="adjustDigit(3, -1)">▼</div>
                    </div>
                </div>
                
                <!-- Running Timer Display (hidden initially) -->
                <div class="timer-display" id="timerDisplay" style="display: none;">05:00</div>
                
                <div class="timer-controls">
                    <button class="timer-button start-btn" id="startBtn" onclick="startTimer()">Start</button>
                    <button class="timer-button stop-btn" id="stopBtn" onclick="stopTimer()">Stop</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
