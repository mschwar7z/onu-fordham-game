    <script>
    let selectedCharacters = [];
    let timerInterval;
    let timeLeft = 0;

    function toggleCharacter(card, characterName) {
        const characterId = card.getAttribute('id') || card.getAttribute('data-character') || characterName;
        
        // Play click sound
        if (typeof playClickSound === 'function') {
            playClickSound();
        }
        
        if (card.classList.contains('selected')) {
            // Deselect
            card.classList.remove('selected');
            selectedCharacters = selectedCharacters.filter(char => char !== characterId);
        } else {
            // Select
            card.classList.add('selected');
            selectedCharacters.push(characterId);
        }
        
        // Update play button text and state
        updatePlayButton();
    }

    function updatePlayButton() {
        const playButton = document.getElementById('playButton');
        const characterCount = document.getElementById('characterCount');
        const buttonText = document.getElementById('buttonText');
        const count = selectedCharacters.length;
        
        // Update the count text and button text based on selection
        if (count > 0) {
            buttonText.textContent = 'Play';
            characterCount.textContent = ' ' + count; // Add space before number
            playButton.disabled = false;
            playButton.style.opacity = '1';
        } else {
            buttonText.textContent = 'Timer';
            characterCount.textContent = ''; // Show just "Timer"
            playButton.disabled = false; // Changed from true to false so timer button is clickable
            playButton.style.opacity = '1'; // Changed from 0.7 to 1
        }
    }

    function handleButtonClick() {
        const count = selectedCharacters.length;
        
        if (count > 0) {
            // Play audio for selected characters
            playGameWithAudio();
            
            // Add selected characters to the form
            const form = document.getElementById('gameForm');
            
            // Clear any existing hidden inputs
            const existingInputs = form.querySelectorAll('input[name="selectedCharacters[]"]');
            existingInputs.forEach(input => input.remove());
            
            // Add selected characters as hidden inputs
            selectedCharacters.forEach(character => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'selectedCharacters[]';
                input.value = character;
                form.appendChild(input);
            });
            
            // Submit form to game.php
            form.submit();
        } else {
            // Navigate to the timer page
            window.location.href = 'timer.html';
        }
    }

    // Loading screen functionality
    function hideLoadingScreen() {
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            mainContent.style.display = 'flex';
        }, 500); // Wait for fade out animation
    }

    // Initialize button state and loading screen on page load
    document.addEventListener('DOMContentLoaded', function() {
        updatePlayButton();
        
        // Check if we should skip the loading screen (when coming back from game)
        if (window.location.hash === '#skip-loading') {
            // Skip loading screen and show main content immediately
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContent = document.getElementById('mainContent');
            
            loadingScreen.style.display = 'none';
            mainContent.style.display = 'flex';
            
            // Remove the hash from URL
            history.replaceState(null, null, window.location.pathname);
        } else {
            // Hide loading screen after 3 seconds (normal behavior)
            setTimeout(hideLoadingScreen, 3000);
        }
    });
    </script>
